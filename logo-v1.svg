<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 90" role="img" aria-label="Abhishek Singh — Groundwater Science and Water Resources">
  <title>Abhishek Singh, PhD, PE</title>
  <defs>
    <style>
      .logo-name {
        font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif;
        font-size: 20px;
        font-weight: 400;
        letter-spacing: 4px;
        fill: #ede8df;
      }
      .logo-sub {
        font-family: 'Lora', Georgia, serif;
        font-size: 8.5px;
        letter-spacing: 1.8px;
        fill: #7a95b4;
      }
    </style>
  </defs>

  <!-- ── Mark: piezometric surface — concentric arcs + well ── -->
  <!-- Outer arc  r=22, center (38,42) -->
  <path d="M 16,42 A 22,22 0 0 1 60,42" fill="none" stroke="#c49a3c" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Middle arc r=15 -->
  <path d="M 23,42 A 15,15 0 0 1 53,42" fill="none" stroke="#c49a3c" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Inner arc  r=9 -->
  <path d="M 29,42 A 9,9 0 0 1 47,42"   fill="none" stroke="#c49a3c" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Datum / water-table baseline -->
  <line x1="14" y1="42" x2="62" y2="42" stroke="#c49a3c" stroke-width="0.5" opacity="0.25"/>
  <!-- Well casing -->
  <line x1="38" y1="42" x2="38" y2="65" stroke="#c49a3c" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Well screen perforations -->
  <line x1="34" y1="55" x2="42" y2="55" stroke="#c49a3c" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <line x1="34" y1="61" x2="42" y2="61" stroke="#c49a3c" stroke-width="0.9" stroke-linecap="round" opacity="0.65"/>
  <!-- Center datum point -->
  <circle cx="38" cy="42" r="2.4" fill="#c49a3c"/>

  <!-- ── Vertical divider ────────────────────────────────── -->
  <line x1="80" y1="18" x2="80" y2="72" stroke="#c49a3c" stroke-width="0.55" opacity="0.3"/>

  <!-- ── Wordmark ────────────────────────────────────────── -->
  <text x="96" y="43" class="logo-name">ABHISHEK SINGH</text>
  <!-- Thin amber rule under name -->
  <rect x="96" y="50" width="200" height="0.6" fill="#c49a3c" opacity="0.4"/>
  <!-- Credentials -->
  <text x="96" y="65" class="logo-sub">PhD, PE  ·  Principal Engineer, Water Resources &amp; Supply</text>
</svg>
