<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 108" role="img" aria-label="Abhishek Singh — typographic logo">
  <title>Abhishek Singh, PhD, PE</title>
  <defs>
    <style>
      .v2-first {
        font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif;
        font-size: 50px;
        font-style: italic;
        font-weight: 400;
        fill: #ede8df;
      }
      .v2-last {
        font-family: 'Cormorant Garamond', 'Palatino Linotype', Palatino, Georgia, serif;
        font-size: 12.5px;
        font-weight: 400;
        letter-spacing: 13px;
        fill: #c49a3c;
      }
      .v2-creds {
        font-family: 'Lora', Georgia, serif;
        font-size: 7.5px;
        letter-spacing: 1.4px;
        fill: #7a95b4;
      }
    </style>
  </defs>

  <!-- ── First name: large italic signature ──────────────── -->
  <text x="6" y="58" class="v2-first">Abhishek</text>

  <!-- ── Amber rule ──────────────────────────────────────── -->
  <rect x="6" y="65" width="240" height="0.75" fill="#c49a3c"/>

  <!-- ── Surname: right-anchored, tracked caps ───────────── -->
  <!-- Right-edge aligned to rule endpoint, creating deliberate asymmetric tension -->
  <text x="246" y="82" text-anchor="end" class="v2-last">SINGH</text>

  <!-- ── Credentials ────────────────────────────────────── -->
  <text x="6" y="98" class="v2-creds">PhD, PE  ·  Principal Engineer, Water Resources  ·  INTERA</text>
</svg>
